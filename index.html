<!DOCTYPE html>
<html>
<head>
    <title>🚗 PRATYUSH MISHRA Car Racer - MOBILE FIXED</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: linear-gradient(180deg, #87CEEB 0%, #90EE90 100%);
            overflow: hidden; height: 100vh; 
        }
        canvas { 
            width: 100vw; height: 100vh; 
            max-width: 100%; max-height: 100vh;
            display: block; touch-action: none;
        }
        #ui { 
            position: absolute; top: 20px; left: 20px; 
            color: white; font: bold 24px Arial; z-index: 10;
        }
        #controls { 
            position: absolute; bottom: 20px; width: 100%; 
            display: flex; justify-content: space-between; 
            padding: 0 30px;
        }
        .btn { 
            width: 70px; height: 70px; border-radius: 50%; 
            background: rgba(255,215,0,0.8); border: 3px solid white;
            font-size: 30px; color: black; cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="ui">
        <div id="score">Score: 0</div>
        <div style="font-size: 18px; color: gold;">👑 PRATYUSH MISHRA 👑</div>
    </div>
    
    <div id="controls">
        <div class="btn" id="leftBtn">⬅️</div>
        <div class="btn" id="rightBtn">➡️</div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // RESPONSIVE CANVAS SIZE
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        let score = 0, gameSpeed = 3, gameOn = true;
        let player = { x: 0, y: 0.75, w: 0.1, h: 0.15 };
        let enemies = [], buildings = [], roadOffset = 0;
        let touchLeft = false, touchRight = false;

        function beep(f=400, d=0.1) {
            try {
                const a = new AudioContext();
                const o = a.createOscillator();
                const g = a.createGain();
                o.connect(g); g.connect(a.destination);
                o.frequency.value = f;
                g.gain.setValueAtTime(0.3, a.currentTime);
                g.gain.exponentialRampToValueAtTime(0.01, a.currentTime + d);
                o.start(); o.stop(a.currentTime + d);
            } catch(e) {}
        }

        // MOBILE + PC CONTROLS
        document.getElementById('leftBtn').addEventListener('touchstart', () => touchLeft = true);
        document.getElementById('leftBtn').addEventListener('touchend', () => touchLeft = false);
        document.getElementById('rightBtn').addEventListener('touchstart', () => touchRight = true);
        document.getElementById('rightBtn').addEventListener('touchend', () => touchRight = false);

        window.addEventListener('keydown', e => {
            if (e.key === 'ArrowLeft' || e.key === 'a') touchLeft = true;
            if (e.key === 'ArrowRight' || e.key === 'd') touchRight = true;
        });
        window.addEventListener('keyup', e => {
            if (e.key === 'ArrowLeft' || e.key === 'a') touchLeft = false;
            if (e.key === 'ArrowRight' || e.key === 'd') touchRight = false;
        });

        function spawnEnemy() {
            enemies.push({
                x: [-0.25, 0, 0.25][Math.floor(Math.random()*3)],
                y: -0.2,
                w: 0.1, h: 0.15,
                speed: gameSpeed * 0.001 + Math.random()*0.002
            });
        }

        function collision(a, b) {
            return a.x < b.x + b.w && a.x + a.w > b.x &&
                   a.y < b.y + b.h && a.y + a.h > b.y;
        }

        function update() {
            if (!gameOn) return;

            // Player movement
            let moveX = 0;
            if (touchLeft) moveX -= 0.08;
            if (touchRight) moveX += 0.08;
            player.x = Math.max(-0.4, Math.min(0.4, player.x + moveX));

            roadOffset += gameSpeed * 0.02;

            // Enemies
            for (let i = enemies.length - 1; i >= 0; i--) {
                enemies[i].y += enemies[i].speed;
                if (collision(player, enemies[i])) {
                    gameOn = false;
                    beep(200, 0.3);
                    return;
                }
                if (enemies[i].y > 1.2) {
                    enemies.splice(i, 1);
                    score += 10;
                    document.getElementById('score').textContent = 'Score: ' + score;
                    beep(800, 0.1);
                }
            }

            gameSpeed += 0.005;
        }

        function draw() {
            ctx.save();
            ctx.scale(canvas.width, canvas.height);

            // Sky
            const grad = ctx.createLinearGradient(0, 0, 0, 0.3);
            grad.addColorStop(0, '#87CEEB');
            grad.addColorStop(1, '#98FB98');
            ctx.fillStyle = grad;
            ctx.fillRect(-1, -1, 2, 1);

            // Road
            ctx.fillStyle = '#555';
            ctx.fillRect(-0.45, 0.2, 0.9, 0.8);
            ctx.fillStyle = '#777';
            ctx.fillRect(-0.42, 0.2, 0.84, 0.8);

            // Road lines
            ctx.fillStyle = '#FFFF00';
            for (let i = 0; i < 20; i++) {
                const y = ((i * 0.1 - roadOffset) % 0.2) + 0.2;
                ctx.fillRect(-0.1, y, 0.2, 0.03);
            }

            // Player car (SCALED)
            ctx.fillStyle = '#00F';
            ctx.fillRect(player.x - player.w/2, player.y - player.h/2, player.w, player.h);
            ctx.fillStyle = '#FFF';
            ctx.fillRect(player.x - 0.03, player.y - 0.06, 0.06, 0.03);

            // Enemies
            ctx.fillStyle = '#F00';
            enemies.forEach(e => {
                ctx.fillRect(e.x - e.w/2, e.y - e.h/2, e.w, e.h);
                ctx.fillStyle = '#FFF';
                ctx.fillRect(e.x - 0.03, e.y - 0.06, 0.06, 0.03);
                ctx.fillStyle = '#F00';
            });

            if (!gameOn) {
                ctx.fillStyle = 'rgba(0,0,0,0.8)';
                ctx.fillRect(-0.8, 0.2, 1.6, 0.5);
                ctx.fillStyle = '#FFF';
                ctx.font = 'bold 0.12px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('GAME OVER', 0, 0.4);
                ctx.fillText('Score: ' + score, 0, 0.5);
                ctx.fillText('Tap to Restart', 0, 0.6);
            }
            ctx.restore();
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        canvas.addEventListener('click', () => {
            if (!gameOn) location.reload();
        });

        setInterval(spawnEnemy, 1000);
        loop();
    </script>
</body>
</html>
